<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Молекули → Вълна → Синусоида</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0c0c10;
    --s1:      #141418;
    --s2:      #1c1c22;
    --border:  #2a2a35;
    --purple:  #7c6ff0;
    --purple-l:#a89ef5;
    --purple-d:#3C3489;
    --teal:    #2dd4a4;
    --teal-d:  #085041;
    --amber:   #f0a830;
    --text:    #e8e6f2;
    --text2:   #9896b0;
    --text3:   #5a5870;
    --mono:    'Space Mono', monospace;
    --sans:    'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 20px 40px;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.18;
    pointer-events: none;
  }

  .wrap { position: relative; z-index: 1; width: 100%; max-width: 960px; }

  .hdr-tag {
    font-family: var(--mono); font-size: 11px; color: var(--teal);
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .hdr-tag::before {
    content: ''; width: 6px; height: 6px;
    background: var(--teal); border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  h1 {
    font-family: var(--mono);
    font-size: clamp(16px, 2.8vw, 26px);
    font-weight: 700; margin-bottom: 6px; color: var(--text);
  }
  h1 span { color: var(--teal); }

  .subtitle {
    font-size: 14px; color: var(--text2);
    margin-bottom: 28px; font-weight: 300;
  }

  /* Stage pills */
  .stage-pills {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .pill {
    font-family: var(--mono); font-size: 11px;
    padding: 5px 14px; border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text3); cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .pill:hover { border-color: var(--teal); color: var(--teal); }
  .pill.active { background: var(--teal-d); border-color: var(--teal); color: var(--teal); }

  /* Canvas panels */
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  @media(max-width:600px){ .panels{grid-template-columns:1fr;} }

  .panel {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px 10px;
    transition: border-color 0.3s;
  }
  .panel.active-panel { border-color: var(--teal); }
  .panel-label {
    font-family: var(--mono); font-size: 10px;
    color: var(--text3); text-transform: uppercase;
    letter-spacing: 0.1em; margin-bottom: 8px;
  }
  .panel.active-panel .panel-label { color: var(--teal); }
  canvas { display: block; width: 100%; }

  /* Info strip */
  .info-strip {
    background: var(--s1); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 18px;
    font-size: 14px; color: var(--text2);
    line-height: 1.65; margin-bottom: 20px;
    min-height: 56px; transition: all 0.3s;
  }
  .info-strip strong { color: var(--text); font-weight: 500; }

  /* Controls */
  .ctrl-row {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .btn {
    padding: 9px 20px; border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--s1); color: var(--text2);
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .btn:hover { border-color: var(--teal); color: var(--teal); }
  .btn.primary { border-color: var(--teal); background: var(--teal-d); color: var(--teal); }
  .btn.primary:hover { background: #0d4030; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .freq-row {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--text2); flex: 1; min-width: 200px;
  }
  input[type=range] {
    flex: 1; height: 4px; -webkit-appearance: none;
    appearance: none; background: var(--border); border-radius: 2px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    border-radius: 50%; background: var(--teal); cursor: pointer;
    border: 2px solid var(--bg);
  }
  .freq-val { font-family: var(--mono); font-size: 13px; color: var(--teal); min-width: 60px; }

  .stage-dots { display: flex; gap: 6px; margin-left: auto; }
  .sdot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
  .sdot.on { background: var(--teal); }
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr-tag">Физика · STEM Център · Звукови вълни</div>
  <h1>Молекули <span>→</span> Вълна <span>→</span> Синусоида</h1>
  <p class="subtitle">Как физичният феномен се превръща в математическа крива</p>

  <div class="stage-pills">
    <div class="pill active" id="pill-0" onclick="setStage(0)">1. Молекули</div>
    <div class="pill" id="pill-1" onclick="setStage(1)">2. Налягане</div>
    <div class="pill" id="pill-2" onclick="setStage(2)">3. Синусоида</div>
  </div>

  <div class="panels">
    <div class="panel active-panel" id="panel-0">
      <div class="panel-label">Молекули въздух</div>
      <canvas id="c0" height="160"></canvas>
    </div>
    <div class="panel" id="panel-1">
      <div class="panel-label">Профил на налягане</div>
      <canvas id="c1" height="160"></canvas>
    </div>
    <div class="panel" id="panel-2">
      <div class="panel-label">Синусоида p(x)</div>
      <canvas id="c2" height="160"></canvas>
    </div>
  </div>

  <div class="info-strip" id="info"></div>

  <div class="ctrl-row">
    <button class="btn primary" id="btn-next" onclick="nextStage()">Следваща стъпка →</button>
    <button class="btn" onclick="resetAll()">Нулирай</button>
    <div class="freq-row">
      <span>Честота</span>
      <input type="range" id="freq" min="1" max="4" step="1" value="2" oninput="setFreq(this.value)">
      <span class="freq-val" id="fv">2×</span>
    </div>
    <div class="stage-dots">
      <div class="sdot on" id="sd0"></div>
      <div class="sdot" id="sd1"></div>
      <div class="sdot" id="sd2"></div>
    </div>
  </div>

</div>

<script>
const INFOS = [
  "<strong>Молекулите на въздуха</strong> са в постоянно движение. Когато нещо вибрира — например струна или говорител — то блъска съседните молекули. Те се <strong>сгъстяват</strong> на едно място и <strong>разреждат</strong> на друго.",
  "Ако измерим <strong>налягането</strong> на въздуха на различни позиции в пространството, виждаме редуване на върхове (сгъстявания) и долини (разреждания). Разстоянието между два върха е <strong>дължината на вълната λ</strong>.",
  "Профилът на налягане е точно <strong>синусоида</strong> — p(x) = A · sin(2π·x/λ). Физичният феномен се е превърнал в математическа функция. Оттук идва формулата λ = v / f."
];

let stage = 0;
let freq = 2;
let phase = 0;
let raf;

function setFreq(v) {
  freq = parseInt(v);
  document.getElementById('fv').textContent = v + '×';
}

function setStage(s) {
  stage = s;
  [0,1,2].forEach(i => {
    document.getElementById('pill-'+i).classList.toggle('active', i===s);
    document.getElementById('panel-'+i).classList.toggle('active-panel', i===s);
    document.getElementById('sd'+i).classList.toggle('on', i<=s);
  });
  document.getElementById('info').innerHTML = INFOS[s];
  const btn = document.getElementById('btn-next');
  if (s >= 2) {
    btn.disabled = true;
    btn.textContent = 'Всички стъпки показани';
  } else {
    btn.disabled = false;
    btn.textContent = 'Следваща стъпка →';
  }
}

function nextStage() {
  if (stage < 2) setStage(stage + 1);
}

function resetAll() {
  setStage(0);
}

function resize(canvas) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth;
  const H = 160;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  return { ctx: canvas.getContext('2d'), W, H, dpr };
}

function drawMolecules(t) {
  const canvas = document.getElementById('c0');
  const { ctx, W, H, dpr } = resize(canvas);
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const N = 9;
  const rows = 5;
  const baseSpacing = W / (N + 1);

  for (let row = 0; row < rows; row++) {
    const y = (row + 1) * H / (rows + 1);
    for (let i = 0; i < N; i++) {
      const baseX = (i + 1) * baseSpacing;
      const compression = Math.sin(2 * Math.PI * (i / N) * freq - t);
      const dx = compression * 10;
      const x = baseX + dx;

      const intensity = (compression + 1) / 2;
      const r = Math.round(45 + intensity * 80);
      const g = Math.round(45 + intensity * 110);
      const b = Math.round(255 - intensity * 50);
      ctx.fillStyle = `rgba(${r},${g},${b},0.85)`;

      const radius = 5 + intensity * 3;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.font = `11px 'Space Mono', monospace`;
  ctx.fillStyle = '#2dd4a4';
  ctx.fillText('сгъстяване', W * 0.15, H - 10);
  ctx.fillStyle = '#5a5870';
  ctx.fillText('разреждане', W * 0.55, H - 10);
}

function drawPressure(t) {
  const canvas = document.getElementById('c1');
  const { ctx, W, H, dpr } = resize(canvas);
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const mid = H / 2;

  ctx.strokeStyle = '#2a2a35';
  ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(0, mid); ctx.lineTo(W, mid); ctx.stroke();

  ctx.strokeStyle = '#7c6ff0';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let x = 0; x <= W; x++) {
    const y = mid - 48 * Math.sin(2 * Math.PI * (x / W) * freq - t);
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  ctx.font = `10px 'Space Mono', monospace`;
  ctx.fillStyle = '#5a5870';
  ctx.fillText('p+', 6, mid - 42);
  ctx.fillText('p-', 6, mid + 52);
  ctx.fillStyle = '#2dd4a4';
  ctx.fillText('λ', W / 2 / freq, mid + 20);
}

function drawSine(t) {
  const canvas = document.getElementById('c2');
  const { ctx, W, H, dpr } = resize(canvas);
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const mid = H / 2;

  ctx.strokeStyle = '#2a2a35'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(0, mid); ctx.lineTo(W, mid); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(0, H - 10); ctx.stroke();

  ctx.strokeStyle = '#2dd4a4'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let x = 0; x <= W; x++) {
    const y = mid - 48 * Math.sin(2 * Math.PI * (x / W) * freq - t);
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  const wLen = W / freq;
  ctx.strokeStyle = '#f0a830'; ctx.lineWidth = 1;
  ctx.setLineDash([4, 3]);
  ctx.beginPath(); ctx.moveTo(0, mid - 48); ctx.lineTo(W, mid - 48); ctx.stroke();
  ctx.setLineDash([]);

  ctx.font = `10px 'Space Mono', monospace`;
  ctx.fillStyle = '#f0a830';
  ctx.fillText('A', 4, mid - 50);
  ctx.fillStyle = '#2dd4a4';
  ctx.fillText('λ = v/f', W / 2 - 20, H - 8);
  ctx.fillStyle = '#7c6ff0';
  ctx.fillText('p(x) = A·sin(2π·x/λ)', 8, 14);
}

function loop() {
  phase += 0.04;
  drawMolecules(phase);
  if (stage >= 1) drawPressure(phase);
  if (stage >= 2) drawSine(phase);
  raf = requestAnimationFrame(loop);
}

setStage(0);
document.getElementById('info').innerHTML = INFOS[0];
loop();
</script>
</body>
</html>
